# ============================================
# YouTube Shorts 자동화 파이프라인 설정
# ============================================

# --- 대본 생성 설정 ---
generator:
  model: "gemini-2.5-flash"
  # 각 페르소나 정의
  personas:
    a:
      name: "남자편"
      description: "남자 입장을 차갑고 논리적으로 대변하는 AI. 팩트와 이유를 들어 남자 행동을 정당화하거나 여자의 과민반응을 지적한다."
      tone: "단호하고 논리적, 가끔 억울함을 드러냄"
    b:
      name: "여자편"
      description: "여자 입장을 감성적이고 공감하며 대변하는 AI. 상처받은 감정과 당연한 기대를 표현하며 남자의 잘못을 짚는다."
      tone: "감성적이고 공감 위주, 가끔 단호하게 선 긋기"
  # 남녀/커플 갈등 상황 주제 풀
  topics:
    - "남자친구가 생일을 까먹었다"
    - "남자친구가 게임하느라 약속에 1시간 지각했다"
    - "여자친구가 전 남친이랑 아직 연락 중이다"
    - "더치페이 vs 남자가 항상 내야 한다"
    - "남자친구가 친구 여자와 단둘이 밥을 먹었다"
    - "여자친구 핸드폰 잠금 해제를 요구하는 남자친구"
    - "데이트 코스, 맨날 남자가 정해야 하나"
    - "남자친구가 여자 친구 SNS 팔로워 관리를 요구한다"
    - "여자친구가 남자 친구 몰래 남사친과 술을 마셨다"
    - "결혼 후 명절, 양가 공평하게 가야 하나 시댁 먼저 가야 하나"
    - "남자친구가 화났을 때 연락을 끊는다"
    - "여자친구가 남자친구 친구들 모임에 따라오고 싶어 한다"
  # 대사 수 (한 캐릭터당)
  lines_per_character: 5

# --- TTS 설정 ---
tts:
  provider: "edge_tts"
  edge_tts:
    # 한국어 음성 목록: https://speech.platform.bing.com/consumer/speech/synthesize/readaloud/voices/list?trustedclienttoken=6A5AA1D4EAFF4E9FB37E23D68491D6F4
    voice_a: "en-US-AndrewMultilingualNeural"   # 남자편: 영어 억양으로 한국어 읽기 (샤갈 효과)
    voice_b: "en-US-BrianMultilingualNeural"  # 여자편: 영어 억양으로 한국어 읽기 (샤갈 효과)
    rate_a: "+15%"                             # 남자편: 빠르고 단호하게
    rate_b: "+5%"                              # 여자편: 약간 빠르게

# --- 영상 편집 설정 ---
editor:
  # 영상 해상도 (9:16 세로)
  width: 1080
  height: 1920
  fps: 30
  # 배경 영상 (assets/backgrounds/ 폴더에 넣기)
  background_video: "assets/backgrounds/background.mp4"
  # 배경음악
  bgm: "assets/bgm/bgm.mp3"
  bgm_volume: 0.08
  # 자막 스타일
  subtitle:
    font: "assets/fonts/NanumGothicBold.ttf"
    font_size: 58
    color: "white"
    stroke_color: "black"
    stroke_width: 3
    position_y_ratio: 0.72  # 화면 하단 72% 위치
    max_chars_per_line: 14
  # 캐릭터 이름 표시
  name_tag:
    font_size: 42
    color_a: "#74B9FF"   # 남자편: 파란색
    color_b: "#FF7675"   # 여자편: 빨간색
    position_y_ratio: 0.65

# --- 유튜브 업로드 설정 ---
uploader:
  # OAuth 인증 파일 경로
  client_secrets: "client_secrets.json"
  token_file: "token.json"
  # 업로드 기본값
  category_id: "22"         # People & Blogs
  privacy_status: "public"  # public / private / unlisted
  tags:
    - "쇼츠"
    - "shorts"
    - "커플갈등"
    - "연애"
    - "남녀갈등"
    - "판결해줘"
    - "연애상담"

# --- 스케줄링 설정 ---
schedule:
  enabled: true
  # 매일 실행 시간 (24시간 형식)
  daily_time: "09:00"
